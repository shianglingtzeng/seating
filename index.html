<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
  --bg:#0B0F1A;
  --surface:#131826;
  --surface2:#1C2235;
  --border:#2A3352;
  --accent:#4A8CFF;
  --accent2:#00D4A4;
  --gold:#FFB547;
  --text:#E8EDF8;
  --muted:#6B7A9F;
  --a-color:#4A8CFF;
  --b-color:#00D4A4;
  --c-color:#FFB547;
  --a-bg:rgba(74,140,255,0.08);
  --b-bg:rgba(0,212,164,0.08);
  --c-bg:rgba(255,181,71,0.08);
  --a-border:rgba(74,140,255,0.25);
  --b-border:rgba(0,212,164,0.25);
  --c-border:rgba(255,181,71,0.25);
}

body{
  font-family:'Noto Serif TC',serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding:0;
}

/* ── Header ── */
.header{
  background:linear-gradient(135deg,#0D1422 0%,#131E35 50%,#0D1422 100%);
  border-bottom:1px solid var(--border);
  padding:24px 20px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% -20%,rgba(74,140,255,0.12),transparent);
  pointer-events:none;
}
.header-tag{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;
  color:var(--accent);text-transform:uppercase;margin-bottom:8px;
}
.header h1{
  font-size:clamp(18px,4vw,26px);font-weight:700;color:#fff;
  letter-spacing:1px;margin-bottom:4px;
}
.header-sub{font-size:12px;color:var(--muted);letter-spacing:1px;}
.total-badge{
  display:inline-block;margin-top:12px;
  font-family:'DM Mono',monospace;font-size:11px;
  background:rgba(74,140,255,0.12);border:1px solid rgba(74,140,255,0.3);
  color:var(--accent);padding:4px 14px;border-radius:99px;
}

/* ── Search ── */
.search-wrap{
  padding:20px 16px 12px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10;
}
.search-box{
  position:relative;display:flex;align-items:center;gap:10px;
}
.search-icon{
  position:absolute;left:14px;font-size:16px;color:var(--muted);pointer-events:none;
}
#search{
  width:100%;padding:12px 14px 12px 42px;
  border-radius:10px;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);font-size:15px;
  font-family:'Noto Serif TC',serif;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
#search:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(74,140,255,0.12);
}
#search::placeholder{color:var(--muted);}
.search-hint{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--muted);margin-top:8px;text-align:center;
}

/* ── Results ── */
.results-wrap{padding:12px 16px;}
.result-count{
  font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);
  margin-bottom:12px;letter-spacing:.5px;
}

.result-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  transition:transform .15s,border-color .15s,box-shadow .15s;
  animation:fadeIn .2s ease;
}
.result-card:hover{
  transform:translateY(-1px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}
.result-card.zone-a{border-left:3px solid var(--a-color);background:linear-gradient(135deg,var(--a-bg),var(--surface));}
.result-card.zone-b{border-left:3px solid var(--b-color);background:linear-gradient(135deg,var(--b-bg),var(--surface));}
.result-card.zone-c{border-left:3px solid var(--c-color);background:linear-gradient(135deg,var(--c-bg),var(--surface));}
.result-card:hover.zone-a{border-color:var(--a-border);box-shadow:0 4px 20px rgba(74,140,255,0.1);}
.result-card:hover.zone-b{border-color:var(--b-border);box-shadow:0 4px 20px rgba(0,212,164,0.1);}
.result-card:hover.zone-c{border-color:var(--c-border);box-shadow:0 4px 20px rgba(255,181,71,0.1);}

.seat-badge{
  flex-shrink:0;width:52px;height:52px;border-radius:10px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  font-family:'DM Mono',monospace;
}
.zone-a .seat-badge{background:rgba(74,140,255,0.15);border:1px solid rgba(74,140,255,0.3);}
.zone-b .seat-badge{background:rgba(0,212,164,0.15);border:1px solid rgba(0,212,164,0.3);}
.zone-c .seat-badge{background:rgba(255,181,71,0.15);border:1px solid rgba(255,181,71,0.3);}
.seat-zone{font-size:16px;font-weight:700;line-height:1;}
.zone-a .seat-zone{color:var(--a-color);}
.zone-b .seat-zone{color:var(--b-color);}
.zone-c .seat-zone{color:var(--c-color);}
.seat-num{font-size:10px;color:var(--muted);}

.result-info{flex:1;min-width:0;}
.result-name{
  font-size:14px;font-weight:700;color:var(--text);
  line-height:1.4;word-break:break-all;
}
.result-name mark{
  background:rgba(74,140,255,0.25);color:#fff;
  border-radius:2px;padding:0 1px;
}
.result-seat-label{
  font-family:'DM Mono',monospace;font-size:11px;
  color:var(--muted);margin-top:3px;
}

/* ── Venue map ── */
.section-title{
  font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;
  color:var(--muted);text-transform:uppercase;
  padding:16px 16px 8px;
  border-top:1px solid var(--border);margin-top:4px;
}
.venue-wrap{
  padding:0 16px 16px;overflow-x:auto;
}
.stage-bar{
  text-align:center;font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:3px;color:var(--muted);
  border:1px solid var(--border);border-radius:6px;
  padding:6px;margin-bottom:10px;
  background:linear-gradient(135deg,rgba(74,140,255,0.05),rgba(0,212,164,0.05));
}
.zone-headers{display:flex;gap:8px;margin-bottom:4px;padding-left:22px;}
.zh{flex:1;text-align:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:3px 0;border-radius:4px;letter-spacing:.5px;}
.zh-a{color:var(--a-color);background:rgba(74,140,255,0.1);}
.zh-b{color:var(--b-color);background:rgba(0,212,164,0.1);flex:1.5;}
.zh-c{color:var(--c-color);background:rgba(255,181,71,0.1);}

.vrow{display:flex;align-items:center;gap:2px;margin-bottom:2px;}
.row-label{
  width:18px;flex-shrink:0;font-family:'DM Mono',monospace;
  font-size:9px;color:var(--muted);text-align:right;padding-right:3px;
}
.zone-seats{display:flex;gap:2px;}
.zone-gap{width:8px;flex-shrink:0;}

.seat{
  width:26px;height:22px;border-radius:3px;
  font-size:7px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:transform .1s,box-shadow .1s;
  overflow:hidden;position:relative;
  border:1px solid transparent;
}
.seat:hover{transform:scale(1.1);z-index:2;}
.seat-empty-a{background:rgba(74,140,255,0.06);border-color:rgba(74,140,255,0.15);color:rgba(74,140,255,0.3);}
.seat-empty-b{background:rgba(0,212,164,0.06);border-color:rgba(0,212,164,0.15);color:rgba(0,212,164,0.3);}
.seat-empty-c{background:rgba(255,181,71,0.06);border-color:rgba(255,181,71,0.15);color:rgba(255,181,71,0.3);}
.seat-filled-a{background:rgba(74,140,255,0.2);border-color:rgba(74,140,255,0.5);color:var(--a-color);}
.seat-filled-b{background:rgba(0,212,164,0.2);border-color:rgba(0,212,164,0.5);color:var(--b-color);}
.seat-filled-c{background:rgba(255,181,71,0.2);border-color:rgba(255,181,71,0.5);color:var(--c-color);}
.seat.highlight{
  background:#4A8CFF!important;border-color:#4A8CFF!important;
  color:#fff!important;transform:scale(1.15);z-index:3;
  box-shadow:0 0 0 3px rgba(74,140,255,0.4);
  animation:seatPulse .6s ease 2;
}
@keyframes seatPulse{0%,100%{box-shadow:0 0 0 3px rgba(74,140,255,0.4);}50%{box-shadow:0 0 0 6px rgba(74,140,255,0.15);}}

/* ── Tooltip ── */
#tooltip{
  position:fixed;pointer-events:none;z-index:999;
  background:#1C2235;border:1px solid var(--border);
  color:var(--text);font-size:11px;padding:7px 12px;
  border-radius:8px;max-width:220px;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
  font-family:'Noto Serif TC',serif;line-height:1.5;
}
#tooltip .tt-seat{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:2px;}

/* ── Empty state ── */
.empty-state{
  text-align:center;padding:40px 20px;
  color:var(--muted);font-size:13px;
}
.empty-icon{font-size:32px;margin-bottom:8px;}

/* ── Footer ── */
.footer{
  text-align:center;padding:16px;
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--muted);border-top:1px solid var(--border);
  letter-spacing:.5px;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
</style>
</head>

const ZS = [6,9,6];
const ZK = ['A','B','C'];

function buildMap(){
  const wrap = document.getElementById('vmap');
  wrap.innerHTML = '';
  for(let r=0;r<10;r++){
    const row = document.createElement('div');
    row.className = 'vrow';
    const lbl = document.createElement('div');
    lbl.className = 'row-label';
    lbl.textContent = r+1;
    row.appendChild(lbl);
    for(let z=0;z<3;z++){
      if(z>0){const g=document.createElement('div');g.className='zone-gap';row.appendChild(g);}
      const zd = document.createElement('div');
      zd.className = 'zone-seats';
      for(let s=1;s<=ZS[z];s++){
        const code = ZK[z]+(r+1)+'-'+s;
        const name = DATA[code]||'';
        const el = document.createElement('div');
        el.className = 'seat ' + (name ? 'seat-filled-'+ZK[z].toLowerCase() : 'seat-empty-'+ZK[z].toLowerCase());
        el.id = 'seat-'+code;
        el.textContent = name ? (name.trim()[0]||'?') : '';
        el.title = code;
        el.addEventListener('mouseenter', (e)=>showTip(e,code,name));
        el.addEventListener('mouseleave', hideTip);
        el.addEventListener('touchstart', (e)=>{e.preventDefault();showTip(e.touches[0],code,name);document.getElementById('search').value=name.split(' ')[0];doSearch();});
        zd.appendChild(el);
      }
      row.appendChild(zd);
    }
    wrap.appendChild(row);
  }
}

const tt = document.getElementById('tooltip');
const ttSeat = document.getElementById('tt-seat');
const ttName = document.getElementById('tt-name');
function showTip(e,code,name){
  if(!name){tt.style.display='none';return;}
  ttSeat.textContent = code;
  ttName.textContent = name;
  tt.style.display='block';
  moveTip(e);
}
function moveTip(e){
  const x=e.clientX,y=e.clientY;
  tt.style.left=(x+14)+'px';
  tt.style.top=(y-36)+'px';
}
function hideTip(){tt.style.display='none';}
document.addEventListener('mousemove',e=>{if(tt.style.display!=='none')moveTip(e);});

let highlightTimeout;
function doSearch(){
  const kw = document.getElementById('search').value.trim().toLowerCase();
  const wrap = document.getElementById('results-wrap');

  // Clear seat highlights
  document.querySelectorAll('.seat.highlight').forEach(el=>el.classList.remove('highlight'));
  clearTimeout(highlightTimeout);

  if(!kw){
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">🎟</div><div>輸入姓名或單位關鍵字<br>即可查詢座位號碼</div></div>';
    return;
  }

  const results = Object.entries(DATA).filter(([code,name])=>name.toLowerCase().includes(kw));

  if(!results.length){
    wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div>找不到「' + kw + '」相關座位</div></div>';
    return;
  }

  const countEl = document.createElement('div');
  countEl.className = 'result-count';
  countEl.textContent = '找到 ' + results.length + ' 筆結果';
  wrap.innerHTML='';
  wrap.appendChild(countEl);

  results.forEach(([code,name])=>{
    const zone = code[0].toLowerCase();
    const card = document.createElement('div');
    card.className = 'result-card zone-'+zone;

    const badge = document.createElement('div');
    badge.className = 'seat-badge';
    badge.innerHTML = '<span class="seat-zone">'+code[0]+'</span><span class="seat-num">'+code.slice(1)+'</span>';

    const info = document.createElement('div');
    info.className = 'result-info';
    const nameEl = document.createElement('div');
    nameEl.className = 'result-name';
    // Highlight keyword
    const re = new RegExp('('+kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')', 'gi');
    nameEl.innerHTML = name.replace(re,'<mark>$1</mark>');
    const seatEl = document.createElement('div');
    seatEl.className = 'result-seat-label';
    seatEl.textContent = '座位 ' + code;

    info.appendChild(nameEl);
    info.appendChild(seatEl);
    card.appendChild(badge);
    card.appendChild(info);

    // Click to highlight on map
    card.addEventListener('click',()=>{
      document.querySelectorAll('.seat.highlight').forEach(el=>el.classList.remove('highlight'));
      const seatEl2 = document.getElementById('seat-'+code);
      if(seatEl2){
        seatEl2.classList.add('highlight');
        seatEl2.scrollIntoView({behavior:'smooth',block:'center'});
      }
    });

    wrap.appendChild(card);

    // Auto-highlight on map
    const seatEl3 = document.getElementById('seat-'+code);
    if(seatEl3) seatEl3.classList.add('highlight');
  });
}

buildMap();
